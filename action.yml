name: 'Android Emulator Setup and APK Runner'
description: 'Setup Android emulator environment, install APK, run pre-script for initialization, and execute app via ADB commands'
author: 'rtang'

inputs:
  apk-path:
    description: 'Absolute path to the APK file to install'
    required: true
  pre-script-path:
    description: 'Path to pre-script that runs after APK installation (e.g., login process, token injection)'
    required: false
    default: ''
  run-script-path:
    description: 'Path to script that runs the APK via ADB commands (e.g., start pages, UI automation)'
    required: false
    default: ''
  api-level:
    description: 'Android API level for the emulator'
    required: false
    default: '29'
  target:
    description: 'Android target (google_apis or default)'
    required: false
    default: 'google_apis'
  arch:
    description: 'Android architecture (x86_64 or x86)'
    required: false
    default: 'x86_64'
  profile:
    description: 'AVD hardware profile'
    required: false
    default: 'Nexus 6'
  emulator-options:
    description: 'Additional emulator startup options'
    required: false
    default: '-no-snapshot-save -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -camera-back none -camera-front none'

outputs:
  emulator-name:
    description: 'Name of the created Android emulator'
    value: ""
  device-serial:
    description: 'Device serial number of the emulator'
    value: ""
  package-name:
    description: 'Package name of the installed APK'
    value: ""

runs:
  using: 'composite'
  steps:
    - name: Enable KVM group (Linux only)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        
    - name: Setup Android SDK
      shell: bash
      run: |
        # Ensure Android SDK is available
        if [ -z "$ANDROID_SDK_ROOT" ] && [ -z "$ANDROID_HOME" ]; then
          export ANDROID_HOME=$HOME/android-sdk
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        fi
        
    - name: Run Android Emulator with APK Testing
      uses: reactivecircus/android-emulator-runner@v2.34.0
      with:
        api-level: ${{ inputs.api-level }}
        target: ${{ inputs.target }}
        arch: ${{ inputs.arch }}
        profile: ${{ inputs.profile }}
        ram-size: 2048M
        heap-size: 512M
        emulator-options: ${{ inputs.emulator-options }}
        disable-animations: true
        force-avd-creation: false
        script: |
          echo "🚀 Starting Android emulator script execution..."
          ${{ github.action_path }}/emulator-script.sh
      env:
        APK_PATH: ${{ inputs.apk-path }}
        PRE_SCRIPT_PATH: ${{ inputs.pre-script-path }}
        RUN_SCRIPT_PATH: ${{ inputs.run-script-path }}

branding:
  icon: 'smartphone'
  color: 'green'