name: 'Android Emulator Setup and APK Runner'
description: 'Setup Android emulator environment, install APK, run pre-script for initialization, and execute app via ADB commands'
author: 'rtang'

inputs:
  apk-path:
    description: 'Absolute path to the APK file to install'
    required: true
  pre-script-path:
    description: 'Path to pre-script that runs after APK installation (e.g., login process, token injection)'
    required: false
    default: ''
  run-script-path:
    description: 'Path to script that runs the APK via ADB commands (e.g., start pages, UI automation)'
    required: false
    default: ''
  api-level:
    description: 'Android API level for the emulator'
    required: false
    default: '29'
  target:
    description: 'Android target (google_apis or default)'
    required: false
    default: 'google_apis'
  arch:
    description: 'Android architecture (x86_64 or x86)'
    required: false
    default: 'x86_64'
  profile:
    description: 'AVD hardware profile'
    required: false
    default: 'Nexus 6'
  emulator-options:
    description: 'Additional emulator startup options'
    required: false
    default: '-no-snapshot-save -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -camera-back none -camera-front none -memory 2048'
  disable-linux-hw-accel:
    description: 'Disable hardware acceleration on Linux (useful for environments without KVM)'
    required: false
    default: 'false'
  working-directory:
    description: 'Working directory for the emulator runner'
    required: false
    default: '.'
  skip-kvm-setup:
    description: 'Skip KVM setup on Linux (useful for environments where KVM setup causes issues)'
    required: false
    default: 'false'

outputs:
  emulator-name:
    description: 'Name of the created Android emulator'
    value: ${{ steps.emulator-runner.outputs.emulator-name }}
  device-serial:
    description: 'Device serial number of the emulator'
    value: ${{ steps.emulator-runner.outputs.device-serial }}
  package-name:
    description: 'Package name of the installed APK'
    value: ${{ steps.emulator-runner.outputs.package-name }}

runs:
  using: 'composite'
  steps:
    - name: Enable KVM group perms (Linux only)
      if: runner.os == 'Linux' && inputs.skip-kvm-setup != 'true'
      shell: bash
      run: |
        # Check if sudo is available and KVM device exists
        if command -v sudo >/dev/null 2>&1 && [ -e /dev/kvm ]; then
          echo "Setting up KVM permissions with sudo..."
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        elif [ -e /dev/kvm ]; then
          echo "KVM device exists but sudo not available - trying direct permission change..."
          # Try to change permissions directly (might work if runner has appropriate access)
          chmod 666 /dev/kvm 2>/dev/null && echo "KVM permissions set" || echo "Could not set KVM permissions - continuing without hardware acceleration"
        else
          echo "KVM device not found or sudo not available - skipping KVM setup"
          echo "Emulator will run without hardware acceleration"
        fi
        
    - name: Setup Android SDK
      shell: bash
      run: |
        # Ensure Android SDK is available
        if [ -z "$ANDROID_SDK_ROOT" ] && [ -z "$ANDROID_HOME" ]; then
          export ANDROID_HOME=$HOME/android-sdk
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        fi
        
    - name: Run Android Emulator with APK Testing
      id: emulator-runner
      uses: reactivecircus/android-emulator-runner@v2.34.0
      with:
        api-level: ${{ inputs.api-level }}
        target: ${{ inputs.target }}
        arch: ${{ inputs.arch }}
        profile: ${{ inputs.profile }}
        ram-size: 2048M
        heap-size: 512M
        emulator-options: ${{ inputs.emulator-options }}
        disable-animations: true
        disable-linux-hw-accel: ${{ inputs.disable-linux-hw-accel }}
        force-avd-creation: false
        working-directory: ${{ inputs.working-directory }}
        script: |
          echo "🚀 Starting Android emulator script execution..."
          ${{ github.action_path }}/emulator-script.sh
      env:
        APK_PATH: ${{ inputs.apk-path }}
        PRE_SCRIPT_PATH: ${{ inputs.pre-script-path }}
        RUN_SCRIPT_PATH: ${{ inputs.run-script-path }}

branding:
  icon: 'smartphone'
  color: 'green'