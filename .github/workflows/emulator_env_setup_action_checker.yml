name: CI - Test Emulator Action

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  test-emulator-setup:
    name: Test Emulator Setup Action
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-13]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6
      
    - name: Show Runner Information
      run: |
        echo "=== Runner Information ==="
        echo "OS: $(uname -s)"
        echo "Architecture: $(uname -m)"
        echo "Runner: ${{ matrix.os }}"
        echo "Kernel: $(uname -r)"
        echo "CPU Cores: $(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 'unknown')"
        echo "Total Memory: $(free -h 2>/dev/null | grep '^Mem:' | awk '{print $2}' || system_profiler SPHardwareDataType 2>/dev/null | grep 'Memory:' | awk '{print $2, $3}' || echo 'unknown')"
      
    - name: Run Android Emulator Action
      id: emulator-test
      timeout-minutes: 20
      uses: ./
      with:
        apk-path: '${{ github.workspace }}/test_resource/runtime_crash_checker_app_debug.apk'
        pre-script-path: '${{ github.workspace }}/test-pre-script.sh'
        run-script-path: '${{ github.workspace }}/test-run-script.sh'
        api-level: '28'
        target: 'default'
        arch: 'x86_64'
        disable-linux-hw-accel: ${{ matrix.os == 'ubuntu-latest' }}
        emulator-boot-timeout: ${{ matrix.os == 'ubuntu-latest' && '900' || '600' }}
        emulator-options: '-no-snapshot-save -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -camera-back none -camera-front none -memory 2048 -partition-size 2048'
        
    - name: Verify Action Output
      run: |
        echo "=== Verifying Action Outputs ==="
        
        # Check emulator-name output
        EMULATOR_NAME="${{ steps.emulator-test.outputs.emulator-name }}"
        echo "Emulator name: '$EMULATOR_NAME'"
        if [ -z "$EMULATOR_NAME" ]; then
          echo "❌ FAIL: emulator-name output is empty"
          exit 1
        elif [ "$EMULATOR_NAME" = "android-emulator-runner" ]; then
          echo "✅ PASS: emulator-name is valid"
        else
          echo "⚠️  WARN: emulator-name has unexpected value: $EMULATOR_NAME"
        fi
        
        # Check device-serial output
        DEVICE_SERIAL="${{ steps.emulator-test.outputs.device-serial }}"
        echo "Device serial: '$DEVICE_SERIAL'"
        if [ -z "$DEVICE_SERIAL" ]; then
          echo "❌ FAIL: device-serial output is empty"
          exit 1
        elif [[ "$DEVICE_SERIAL" =~ ^emulator-[0-9]+$ ]]; then
          echo "✅ PASS: device-serial format is valid"
        else
          echo "❌ FAIL: device-serial has invalid format: $DEVICE_SERIAL"
          exit 1
        fi
        
        # Check package-name output
        PACKAGE_NAME="${{ steps.emulator-test.outputs.package-name }}"
        echo "Package name: '$PACKAGE_NAME'"
        if [ -z "$PACKAGE_NAME" ]; then
          echo "❌ FAIL: package-name output is empty"
          exit 1
        elif [[ "$PACKAGE_NAME" =~ ^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)+$ ]]; then
          echo "✅ PASS: package-name format is valid"
        else
          echo "❌ FAIL: package-name has invalid format: $PACKAGE_NAME"
          exit 1
        fi
        
        echo "✅ All action outputs verified successfully!"
        
    - name: Check Test Results
      run: |
        echo "=== Checking test results ==="
        if [ -d "test_result" ]; then
          echo "✅ test_result directory exists"
          ls -la test_result/
          
          # Check for expected screenshots
          if [ -f "test_result/screenshot_initial.png" ]; then
            echo "✅ Initial screenshot found"
          else
            echo "❌ Initial screenshot missing"
          fi
          
          if [ -f "test_result/screenshot_before_launch.png" ]; then
            echo "✅ Before launch screenshot found"
          else
            echo "❌ Before launch screenshot missing"
          fi
          
          if [ -f "test_result/screenshot_after_launch.png" ]; then
            echo "✅ After launch screenshot found"
          else
            echo "❌ After launch screenshot missing"
          fi
        else
          echo "❌ test_result directory not found"
          exit 1
        fi
        
    - name: Upload Screenshots and Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: emulator-test-results-${{ matrix.os }}
        path: |
          test_result/
        retention-days: 5
        
    - name: Final Cleanup
      if: always()
      run: |
        # Kill any remaining processes and clean up ADB
        adb kill-server || true
        echo "Cleanup completed"
        echo "Runner specs: ${{ matrix.os }}"