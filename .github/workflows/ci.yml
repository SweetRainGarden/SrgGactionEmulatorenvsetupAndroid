name: CI - Test Emulator Action

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  test-emulator-setup:
    name: Test Emulator Setup Action
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Show Runner Information
      run: |
        echo "=== Runner Information ==="
        echo "OS: $(uname -s)"
        echo "Architecture: $(uname -m)"
        echo "Runner: ${{ matrix.os }}"
        echo "Kernel: $(uname -r)"
        echo "CPU Cores: $(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 'unknown')"
        echo "Total Memory: $(free -h 2>/dev/null | grep '^Mem:' | awk '{print $2}' || system_profiler SPHardwareDataType 2>/dev/null | grep 'Memory:' | awk '{print $2, $3}' || echo 'unknown')"
      
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 29
        target: google_apis
        arch: x86_64
        
    - name: Run Android Emulator Action
      id: emulator-test
      timeout-minutes: 15
      uses: ./
      with:
        apk-path: '${{ github.workspace }}/test_resource/runtime_crash_checker_app_debug.apk'
        pre-script-path: '${{ github.workspace }}/test-pre-script.sh'
        run-script-path: '${{ github.workspace }}/test-run-script.sh'
        api-level: '29'
        target: 'google_apis'
        arch: 'x86_64'
        
    - name: Verify Action Output
      run: |
        echo "Emulator name: ${{ steps.emulator-test.outputs.emulator-name }}"
        
    - name: Check Test Results
      run: |
        echo "=== Checking test results ==="
        if [ -d "test_result" ]; then
          echo "✅ test_result directory exists"
          ls -la test_result/
          
          # Check for expected screenshots
          if [ -f "test_result/screenshot_initial.png" ]; then
            echo "✅ Initial screenshot found"
          else
            echo "❌ Initial screenshot missing"
          fi
          
          if [ -f "test_result/screenshot_before_launch.png" ]; then
            echo "✅ Before launch screenshot found"
          else
            echo "❌ Before launch screenshot missing"
          fi
          
          if [ -f "test_result/screenshot_after_launch.png" ]; then
            echo "✅ After launch screenshot found"
          else
            echo "❌ After launch screenshot missing"
          fi
        else
          echo "❌ test_result directory not found"
          exit 1
        fi
        
    - name: Upload Screenshots and Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: emulator-test-results-${{ matrix.os }}
        path: |
          test_result/
        retention-days: 5
        
    - name: Final Cleanup
      if: always()
      run: |
        # Kill any remaining processes and clean up ADB
        adb kill-server || true
        echo "Cleanup completed"
        echo "Runner specs: ${{ matrix.os }}"